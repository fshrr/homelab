---
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
      - VERSION=docker
      - PLEX_CLAIM=claim-5a96WuaFmG66JnxtQNHd
    volumes:
      - plex_data:/config
      - tv:/tv
      - movies:/movies
    restart: unless-stopped
    labels:
      - "homepage.group=Media"
      - "homepage.name=Plex"
      - "homepage.icon=sh-plex"
      - "homepage.href=http://localhost:32400"

volumes:
  plex_data:
    external: true
  movies:
    external: true
  tv:
    external: true
