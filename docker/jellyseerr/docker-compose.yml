---
services:
  jellyseerr: 
    image: fallenbagel/jellyseerr:latest 
    container_name: jellyseerr 
    hostname: jellyseerr 
    user: 1001:1001
    environment: 
      - TZ=America/Toronto 
    ports: 
      - 5055:5055 
    volumes: 
      - /mnt/docker/jellyseerr:/app/config 
    restart: unless-stopped 
    labels:
      - "homepage.group=Arrs"
      - "homepage.name=Jellyseerr"
      - "homepage.icon=sh-jellyseerr"
      - "homepage.href=http://192.168.2.100:5055"
