# bazarr.yml
networks:
  arr:
    external: true

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    extends:
      file: ../base.yml
      service: base
    volumes:
      - ${APPDATA_PATH}/bazarr:/config
      - ${MOVIES_PATH}:/movies
      - ${MOVIES_4k_PATH}:/movies_4k
      - ${MOVIES_ANIME_PATH}:/movies_anime
      - ${SHOWS_PATH}:/shows
      - ${SHOWS_ANIME_PATH}:/shows_anime
    ports:
      - 6767:6767
    networks:
      - arr
    restart: unless-stopped
    labels:
      - homepage.group=Arrs
      - homepage.name=Bazarr
      - homepage.icon=bazarr.png
      - homepage.href=http://bromine.fenrir-cardassian.ts.net:6767
