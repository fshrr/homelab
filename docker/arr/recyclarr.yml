# recyclarr.yml
networks:
  arr:
    external: true

services:
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    user: 1001:1001
    volumes:
      - ${APPDATA_PATH}/recyclarr:/config
    environment:
      - TZ=America/Toronto
      - PUID=1001
      - PGID=1001
    networks:
      - arr
