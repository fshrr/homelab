include:
  - torrent.yml
  - usenet.yml

networks:
  arr:
    external: true
  arr-seerr:
    external: true

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    extends:
      file: ../base.yml
      service: base
    volumes:
      - /mnt/docker/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      - arr
    restart: unless-stopped
    labels:
      - homepage.group=Arrs
      - homepage.name=Prowlarr
      - homepage.icon=prowlarr.png
      - homepage.href=http://192.168.2.100:9696

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    extends:
      file: ../base.yml
      service: base
    ports:
      - 7878:7878
    volumes:
      - /mnt/docker/radarr:/config
      - /mnt/nas/media/movies:/movies
      - /mnt/downloads:/downloads
    networks:
      - arr
      - arr-seerr
    restart: unless-stopped
    labels:
      - homepage.group=Arrs
      - homepage.name=Radarr
      - homepage.icon=radarr.png
      - homepage.href=http://192.168.2.100:7878

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    extends:
      file: ../base.yml
      service: base
    volumes:
      - /mnt/docker/sonarr:/config
      - /mnt/nas/media/tv:/tv
      - /mnt/downloads:/downloads
    ports:
      - 8989:8989
    networks:
      - arr
      - arr-seerr
    restart: unless-stopped
    labels:
      - homepage.group=Arrs
      - homepage.name=Sonarr
      - homepage.icon=sonarr.png
      - homepage.href=http://192.168.2.100:8989

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    extends:
      file: ../base.yml
      service: base
    volumes:
      - /mnt/docker/bazarr:/config
      - /mnt/nas/media/movies:/movies
      - /mnt/nas/media/tv:/tv
    ports:
      - 6767:6767
    networks:
      - arr
    restart: unless-stopped
    labels:
      - homepage.group=Arrs
      - homepage.name=Bazarr
      - homepage.icon=bazarr.png
      - homepage.href=http://192.168.2.100:6767

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr
    container_name: recyclarr
    user: 1001:1001
    volumes:
      - /mnt/docker/recyclarr:/config
    environment:
      - TZ=America/Toronto
      - PUID=1001
      - PGID=1001
    networks:
      - arr
