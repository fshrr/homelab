services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - TZ=America/Toronto
    volumes:
      - prowlarr_data:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    labels:
      - "homepage.group=Content Fetchers"
      - "homepage.name=Prowlarr"
      - "homepage.icon=sh-prowlarr"
      - "homepage.href=http://192.168.2.100:9696"

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - TZ=America/Toronto
    ports:
      - 7878:7878
    volumes:
      - radarr_data:/config
      - movies:/movies
      - downloads:/downloads
    restart: unless-stopped
    labels:
      - "homepage.group=Content Fetchers"
      - "homepage.name=Radarr"
      - "homepage.icon=sh-radarr"
      - "homepage.href=http://192.168.2.100:7878"

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - TZ=America/Toronto
    volumes:
      - sonarr_data:/config
      - tv:/tv
      - downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped
    labels:
      - "homepage.group=Content Fetchers"
      - "homepage.name=Sonarr"
      - "homepage.icon=sh-sonarr"
      - "homepage.href=http://192.168.2.100:8989"

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - TZ=Etc/UTC
    volumes:
      - bazarr_data:/config
      - movies:/movies
      - tv:/tv
    ports:
      - 6767:6767
    restart: unless-stopped
    labels:
      - "homepage.group=Content Fetchers"
      - "homepage.name=Bazarr"
      - "homepage.icon=sh-bazarr"
      - "homepage.href=http://192.168.2.100:6767"

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - TZ=America/Toronto
      - TRANSMISSION_WEB_HOME= #optional
      - USER= #optional
      - PASS= #optional
      - WHITELIST= #optional
      - PEERPORT= #optional
      - HOST_WHITELIST= #optional
    volumes:
      - transmission_data:/config
      - downloads:/downloads
      # - /mnt/data/torrent_watch:/watch
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
    labels:
      - "homepage.group=Content Fetchers"
      - "homepage.name=Transmission"
      - "homepage.icon=sh-transmission"
      - "homepage.href=http://192.168.2.100:9091"

volumes:
  prowlarr_data:
  radarr_data:
  sonarr_data:
  bazarr_data:
  transmission_data:
  movies:
    external: true
  tv:
    external: true
  downloads:
    external: true
