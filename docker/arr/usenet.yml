services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=America/Toronto
    volumes:
      - /mnt/docker/sabnzbd:/config
      - /mnt/downloads:/downloads
      - /mnt/downloads/incomplete:/incomplete-downloads
    ports:
      - 8080:8080
    restart: unless-stopped
    labels:
      - "homepage.group=Download Clients"
      - "homepage.name=sabnzbd"
      - "homepage.icon=sh-sabnzbd"
      - "homepage.href=http://192.168.2.100:8080"

