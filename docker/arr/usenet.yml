# usenet.yml
networks:
  arr:
    external: true

services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    extends:
      file: ../base.yml
      service: base
    volumes:
      - ${APPDATA_PATH}/sabnzbd:/config
      - ${DOWNLOADS_PATH}:/downloads
      - ${DOWNLOADS_PATH}/incomplete:/incomplete
    ports:
      - 8081:8081
    networks:
      - arr
    restart: unless-stopped
    labels:
      - homepage.group=Download Clients
      - homepage.name=sabnzbd
      - homepage.icon=sabnzbd.png
      - homepage.href=http://bromine.fenrir-cardassian.ts.net:8081

