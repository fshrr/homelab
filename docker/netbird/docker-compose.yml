services:
  netbird-client:
    image: netbirdio/netbird:latest
    container_name: netbird
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY}
      - NB_ALLOW_SERVER_SSH=true
    volumes:
      - netbird-client:/etc/netbird
    restart: unless-stopped

volumes:
  netbird-client:
