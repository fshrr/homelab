networks:
  traefik:
    external: true

services:
  actual_server:
    image: docker.io/actualbudget/actual-server:latest
    container_name: actualbudget
    networks:
      - traefik
    # ports:
    #  - '5006:5006'
    user: 1001:1001
    # environment:
      # - ACTUAL_PORT=5006
      # - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=20
      # - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      # - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=20
      # See all options and more details at https://actualbudget.github.io/docs/Installing/Configuration
    volumes:
      - /mnt/docker/actualbudget:/data
    restart: unless-stopped
    labels:
      - homepage.group=Personal
      - homepage.name=Actual Budget
      - homepage.icon=actual.png
      - homepage.href=https://budget.fshrr.com
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.actualbudget.rule=Host(`budget.fshrr.com`)"
      - "traefik.http.routers.actualbudget.entrypoints=websecure"
      - "traefik.http.routers.actualbudget.service=actualbudget"
      - "traefik.http.services.actualbudget.loadbalancer.server.port=5006"
