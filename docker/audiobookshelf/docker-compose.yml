volumes:
  metadata:
    driver: local
  config:
    driver: local

networks:
  traefik:
    external: true

services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    networks:
      - traefik
    volumes:
      - /mnt/nas/media/audiobooks:/audiobooks
      - /mnt/nas/media/podcasts:/podcasts
      - metadata:/metadata
      - config:/config
    restart: unless-stopped
    labels:
      - homepage.group=Media
      - homepage.name=Audiobookshelf
      - homepage.icon=audiobookshelf.png
      - homepage.href=http://audiobooks.homelab.fahimshahreer.com
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`audiobooks.homelab.fahimshahreer.com`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"
