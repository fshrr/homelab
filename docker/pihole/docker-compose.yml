networks:
  pihole_network:
    driver: macvlan
    driver_opts:
      parent: enp2s0
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.1

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    networks:
      pihole_network:
        ipv4_address: '192.168.2.101'
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
      - "80:80/tcp"
    environment:
      TZ: 'America/Toronto'
      # WEBPASSWORD: 'choose secured password' #update password
    volumes:
      - '/mnt/docker/pihole/etc-pihole:/etc/pihole'
      - '/mnt/docker/pihole/etc-dnsmasq.d:/etc/dnsmasq.d'
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    labels:
      - homepage.group=Management
      - homepage.name=Pihole
      - homepage.icon=pi-hole.png
      - homepage.href=http://192.168.2.101/admin
